name: Sync and Update Repository

on:
  workflow_dispatch:

concurrency:
  group: sync-base-image
  cancel-in-progress: false

jobs:
  sync_hotio_base_image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          repository: engels74/base-image
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add Upstream Repository
        run: git remote add upstream https://github.com/hotio/base.git

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Sync and Apply Custom Updates
        run: |
          set -e

          # Branches in hotio's listing order: workflows (default), then alpinevpn, noblevpn
          BRANCHES_TO_SYNC="workflows alpinevpn noblevpn"
          TARGET_REPO_OWNER="engels74"
          UPSTREAM_REPO_OWNER="hotio"

          for branch in $BRANCHES_TO_SYNC; do
            echo "--- Processing branch: $branch ---"

            # 1. Hard reset to upstream
            git checkout -B "$branch" "upstream/$branch"
            if [ $? -ne 0 ]; then
              echo "Error checking out upstream/$branch. Skipping."
              continue
            fi

            # 2a. Repoint call-build.yml at engels74/base-image@workflows
            CALL_BUILD=".github/workflows/call-build.yml"
            if [[ -f "$CALL_BUILD" ]]; then
              sed -i 's|hotio/base/.github/workflows/build-on-call.yml@workflows|engels74/base-image/.github/workflows/build-on-call.yml@workflows|' "$CALL_BUILD"
              echo "Updated $CALL_BUILD"
            fi

            # 2b. Repoint call-update.yml at engels74/base-image@workflows
            CALL_UPDATE=".github/workflows/call-update.yml"
            if [[ -f "$CALL_UPDATE" ]]; then
              sed -i 's|hotio/base/.github/workflows/update-on-call.yml@workflows|engels74/base-image/.github/workflows/update-on-call.yml@workflows|' "$CALL_UPDATE"
              echo "Updated $CALL_UPDATE"
            fi

            # 2c. Branding patches — only on the image branches, not on workflows
            if [[ "$branch" != "workflows" ]]; then
              INIT_SETUP="root/etc/s6-overlay/s6-rc.d/init-setup/run"
              if [[ -f "$INIT_SETUP" ]]; then
                sed -i '/figlet/ s/hotio/engels74/' "$INIT_SETUP"
                sed -i '/Donate:/ s|https://hotio.dev/donate|https://engels74.net/donate|' "$INIT_SETUP"
                sed -i '/Documentation:/ s|https://hotio.dev|https://engels74.net|' "$INIT_SETUP"
                sed -i '/Support:/ s|https://hotio.dev/discord|https://github.com/engels74/$(jq -r '"'"'.app'"'"' <<< "${IMAGE_STATS}")/issues|' "$INIT_SETUP"
                echo "Patched $INIT_SETUP with engels74 branding"
              fi

              README="README.md"
              printf '%s\n' \
                '# base-image (engels74)' \
                '' \
                '## For full documentation' \
                '' \
                'Detailed information and documentation available on the [alpinevpn branch README](https://github.com/engels74/base-image/tree/alpinevpn).' > "$README"
              echo "Overwritten $README"
            fi

            # 2d. TEMP PATCH (workflows branch only) — fix a concurrency-group
            # collision in the reusable workflows that causes matrix update jobs
            # to be cancelled by sibling release-branch builds during a parallel
            # fan-out (e.g. `gh dbv`, or any caller that fires call-update
            # against multiple repos at once).
            #
            # Root cause upstream (hotio/base@workflows): both update-on-call.yml
            # and build-on-call.yml declare the same workflow-level concurrency
            # group `${{ github.repository }}-${{ github.ref_name }}` with
            # cancel-in-progress: true. In a workflow_call, github.ref_name is
            # the *caller's* ref, so the build run (triggered on `release` by a
            # push from the release matrix job) shares the group with the still-
            # running update run on the same caller ref and preempts it,
            # killing the nightly matrix job mid-flight.
            #
            # Fix applied here (only on the workflows branch, where these files
            # live):
            #   * update-on-call.yml — drop the workflow-level concurrency block
            #     and add a job-level one on `update` keyed by matrix.branches,
            #     so distinct matrix branches no longer share a group.
            #   * build-on-call.yml — rename the group to `-build-` so build
            #     runs can no longer cancel update runs on the same ref.
            #
            # REMOVE THIS WHOLE BLOCK once the equivalent fix lands upstream on
            # hotio/base@workflows; the next sync will then carry the upstream
            # version through unchanged. Upstream tracking: file/check an issue
            # at https://github.com/hotio/base before deleting this.
            if [[ "$branch" == "workflows" ]]; then
              # Assemble literal '${{' at runtime via bash quote-concatenation:
              # '$' + '' + '{{' → '${{'. This avoids triggering the parent
              # workflow's own ${{ … }} expression parser on the lines below.
              OB='$''{{'
              CB='}}'

              UPDATE_ON_CALL=".github/workflows/update-on-call.yml"
              if [[ -f "$UPDATE_ON_CALL" ]]; then
                # a) Strip workflow-level concurrency block (3 lines + trailing blank)
                sed -i '/^concurrency:$/,/^$/d' "$UPDATE_ON_CALL"

                # b) Insert a job-level concurrency block on the `update` job
                #    keyed by matrix.branches. `r FILE` appends FILE's contents
                #    after the matched line, preserving exact whitespace.
                #    printf is used (not heredoc) so the YAML-file indentation
                #    of the lines below is independent of the indentation that
                #    ends up inside the patched target file.
                printf '%s\n' \
                  '    concurrency:' \
                  "      group: ${OB} github.repository ${CB}-update-${OB} matrix.branches ${CB}" \
                  '      cancel-in-progress: true' \
                  > /tmp/update-job-concurrency.txt
                sed -i '/^    needs: get-branches$/r /tmp/update-job-concurrency.txt' "$UPDATE_ON_CALL"
                rm -f /tmp/update-job-concurrency.txt
                echo "Patched $UPDATE_ON_CALL: job-level concurrency keyed by matrix.branches"
              fi

              BUILD_ON_CALL=".github/workflows/build-on-call.yml"
              if [[ -f "$BUILD_ON_CALL" ]]; then
                sed -i "s|^  group: ${OB} github.repository ${CB}-${OB} github.ref_name ${CB}\$|  group: ${OB} github.repository ${CB}-build-${OB} github.ref_name ${CB}|" "$BUILD_ON_CALL"
                echo "Patched $BUILD_ON_CALL: renamed concurrency group to '-build-' prefix"
              fi
            fi

            # 3. Commit & force-push
            if [[ -n $(git status --porcelain) ]]; then
              git add .
              git commit -m "Sync with upstream ($UPSTREAM_REPO_OWNER/base@$branch) and apply custom updates"
              git push origin "$branch" --force
            else
              echo "No changes detected on branch '$branch'."
            fi

            echo "--- Finished processing branch: $branch ---"
            echo ""
          done

          echo "All specified branches processed."

      - name: Checkout Repo Patches Repository
        uses: actions/checkout@v6
        with:
          repository: engels74/repo-patches
          token: ${{ secrets.GH_PAT }}
          path: repo-patches
          ref: main

      - name: Create and Push Empty Commit to Repo Patches
        working-directory: ./repo-patches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: Trigger downstream workflows [skip ci]"
          git push origin main
          echo "Empty commit pushed to engels74/repo-patches on branch main."
